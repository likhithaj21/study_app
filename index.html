<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JVR'S StudyAI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 30px 16px;
    }

    .page-title {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }

    .page-subtitle {
      text-align: center;
      color: rgba(255,255,255,0.75);
      margin-bottom: 32px;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 32px 28px;
      box-shadow: 0 8px 40px rgba(80,40,160,0.13);
    }

    .card h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #5b21b6;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card h2 .icon {
      font-size: 1.3rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 6px;
      margin-top: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    label:first-of-type { margin-top: 0; }

    input[type="text"],
    select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 9px;
      font-size: 0.97rem;
      color: #1f2937;
      background: #f9fafb;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: #7c3aed;
      background: #fff;
    }

    .file-label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border: 1.5px dashed #c4b5fd;
      border-radius: 9px;
      background: #f5f3ff;
      cursor: pointer;
      transition: border 0.2s, background 0.2s;
    }

    .file-label:hover {
      border-color: #7c3aed;
      background: #ede9fe;
    }

    .file-label input[type="file"] { display: none; }

    .file-label .file-icon { font-size: 1.4rem; }

    .file-label .file-text {
      font-size: 0.88rem;
      color: #7c3aed;
      font-weight: 600;
    }

    #file-name {
      font-size: 0.82rem;
      color: #6b7280;
      margin-top: 6px;
      min-height: 18px;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(90deg, #7c3aed, #6d28d9);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.92; }

    .btn-download {
      background: linear-gradient(90deg, #059669, #047857);
      color: #fff;
      display: none;
      margin-top: 14px;
    }

    .btn-download.visible { display: block; }

    .msg {
      margin-top: 12px;
      font-size: 0.88rem;
      font-weight: 600;
      min-height: 20px;
      border-radius: 7px;
      padding: 0;
    }

    .msg.success { color: #059669; }
    .msg.error   { color: #dc2626; }

    /* ── Output ── */
    #output-section { display: none; }

    #output-section.visible { display: block; }

    .output-title {
      font-size: 1rem;
      font-weight: 700;
      color: #5b21b6;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ede9fe;
    }

    .q-block {
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .q-text {
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 12px;
      font-size: 0.97rem;
      line-height: 1.5;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 0.92rem;
      color: #374151;
      border: 1.5px solid transparent;
      transition: background 0.15s;
    }

    .option.correct {
      background: #d1fae5;
      border-color: #6ee7b7;
      color: #065f46;
      font-weight: 700;
    }

    .option .opt-label {
      font-weight: 700;
      min-width: 22px;
    }

    .tick {
      margin-left: auto;
      font-size: 1rem;
    }

    /* Flashcard */
    .flash-block {
      background: #f5f3ff;
      border: 1.5px solid #c4b5fd;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }

    .flash-q {
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 10px;
      font-size: 0.97rem;
    }

    .flash-a {
      background: #ede9fe;
      border-left: 4px solid #7c3aed;
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      color: #4c1d95;
      font-weight: 600;
      font-size: 0.92rem;
    }

    /* Loader */
    .loader {
      display: none;
      text-align: center;
      padding: 18px 0 6px;
      color: #7c3aed;
      font-weight: 600;
      font-size: 0.92rem;
    }

    .loader.visible { display: block; }

    .spinner {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 3px solid #ede9fe;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Difficulty row */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 500px) {
      .card { padding: 22px 16px; }
      .row-2 { grid-template-columns: 1fr; }
      .page-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="page-title">📚 JVR'S StudyAI</div>
  <div class="page-subtitle">Upload your notes · Generate quizzes, flashcards & papers</div>

  <div class="container">

    <!-- ── Upload Card ── -->
    <div class="card">
      <h2><span class="icon">📤</span> Upload Notes</h2>

      <label>Topic Name</label>
      <input type="text" id="topic-input" placeholder="e.g. Human Reproductive System" />

      <label>Upload Files (PDF / TXT)</label>
      <label class="file-label" for="file-input">
        <span class="file-icon">📁</span>
        <span class="file-text">Choose files…</span>
        <input type="file" id="file-input" multiple accept=".pdf,.txt" onchange="showFileName()" />
      </label>
      <div id="file-name">No files chosen</div>

      <button class="btn btn-primary" onclick="uploadNotes()">⬆ Upload Notes</button>
      <div class="msg" id="upload-msg"></div>
    </div>

    <!-- ── Generate Card ── -->
    <div class="card">
      <h2><span class="icon">⚡</span> Generate Study Material</h2>

      <label>Select Topic</label>
      <select id="topic-select">
        <option value="">-- Loading topics… --</option>
      </select>

      <div class="row-2">
        <div>
          <label>Output Type</label>
          <select id="output-type">
            <option value="quiz">Quiz (MCQ)</option>
            <option value="flashcards">Flashcards</option>
            <option value="question paper">Question Paper</option>
          </select>
        </div>
        <div>
          <label>Difficulty</label>
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
      </div>

      <label>Number of Questions</label>
      <input type="text" id="num-questions" placeholder="e.g. 5" value="5" />

      <button class="btn btn-primary" onclick="generate()">✨ Generate</button>

      <div class="loader" id="loader"><span class="spinner"></span>Generating, please wait…</div>
      <div class="msg" id="gen-msg"></div>
    </div>

    <!-- ── Output Card ── -->
    <div class="card" id="output-section">
      <div class="output-title" id="output-title">Results</div>
      <div id="output-body"></div>
      <button class="btn btn-download" id="download-btn" onclick="downloadPDF()">⬇ Download PDF</button>
    </div>

  </div>

  <script>
    // ── Load Topics ──────────────────────────────────────────
    async function loadTopics() {
      try {
        const res = await fetch("/topics");
        const topics = await res.json();
        const sel = document.getElementById("topic-select");
        sel.innerHTML = topics.length
          ? topics.map(t => `<option value="${t}">${t}</option>`).join("")
          : `<option value="">-- No topics yet --</option>`;
      } catch {
        document.getElementById("topic-select").innerHTML =
          `<option value="">-- Failed to load --</option>`;
      }
    }

    // ── Show File Name ───────────────────────────────────────
    function showFileName() {
      const fi = document.getElementById("file-input");
      const names = Array.from(fi.files).map(f => f.name).join(", ");
      document.getElementById("file-name").textContent = names || "No files chosen";
    }

    // ── Upload Notes ─────────────────────────────────────────
    async function uploadNotes() {
      const topic = document.getElementById("topic-input").value.trim();
      const files = document.getElementById("file-input").files;
      const msg   = document.getElementById("upload-msg");

      if (!topic)         { showMsg(msg, "Please enter a topic name.", "error"); return; }
      if (!files.length)  { showMsg(msg, "Please select at least one file.", "error"); return; }

      const fd = new FormData();
      fd.append("topic", topic);
      for (const f of files) fd.append("file", f);

      showMsg(msg, "Uploading…", "");
      try {
        const res  = await fetch("/upload", { method: "POST", body: fd });
        const text = await res.text();
        if (res.ok) {
          showMsg(msg, "✅ " + text, "success");
          loadTopics();
        } else {
          showMsg(msg, "❌ " + text, "error");
        }
      } catch (e) {
        showMsg(msg, "❌ Upload failed: " + e.message, "error");
      }
    }

    // ── Generate ─────────────────────────────────────────────
    async function generate() {
      const topic  = document.getElementById("topic-select").value;
      const output = document.getElementById("output-type").value;
      const diff   = document.getElementById("difficulty").value;
      const n      = parseInt(document.getElementById("num-questions").value) || 5;
      const msg    = document.getElementById("gen-msg");
      const loader = document.getElementById("loader");

      if (!topic) { showMsg(msg, "Please select a topic.", "error"); return; }

      showMsg(msg, "", "");
      loader.classList.add("visible");
      document.getElementById("output-section").classList.remove("visible");
      document.getElementById("download-btn").classList.remove("visible");

      try {
        const res  = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            topic,
            output_type: output,
            difficulty: diff,
            number_of_questions: n
          })
        });

        const data = await res.json();
        loader.classList.remove("visible");

        if (!res.ok) {
          showMsg(msg, "❌ " + (data.error || "Generation failed."), "error");
          return;
        }

        if (!Array.isArray(data) || data.length === 0) {
          showMsg(msg, "❌ No output received. Try again.", "error");
          return;
        }

        formatOutput(data, output, topic);
        document.getElementById("output-section").classList.add("visible");
        document.getElementById("download-btn").classList.add("visible");
        document.getElementById("output-section").scrollIntoView({ behavior: "smooth" });

      } catch (e) {
        loader.classList.remove("visible");
        showMsg(msg, "❌ Error: " + e.message, "error");
      }
    }

    // ── Format Output ────────────────────────────────────────
    function formatOutput(data, type, topic) {
      const body  = document.getElementById("output-body");
      const title = document.getElementById("output-title");

      const typeLabel = type === "quiz"
        ? "Quiz (MCQ)"
        : type === "flashcards"
        ? "Flashcards"
        : "Question Paper";

      title.textContent = `${typeLabel} — ${topic}`;
      body.innerHTML = "";

      if (type === "flashcards") {
        data.forEach((item, i) => {
          body.innerHTML += `
            <div class="flash-block">
              <div class="flash-q">Q${i + 1}. ${escHtml(item.question)}</div>
              <div class="flash-a">💡 ${escHtml(item.answer)}</div>
            </div>`;
        });

      } else {
        // quiz or question paper
        data.forEach((item, i) => {
          const opts   = item.options || [];
          const correct = (item.answer || "").trim().toUpperCase();

          const optLetters = ["A", "B", "C", "D"];
          const optsHtml = opts.map((opt, idx) => {
            const letter = optLetters[idx] || String.fromCharCode(65 + idx);
            // Strip leading "A." / "A)" from option text if model included it
            const cleanOpt = opt.replace(/^[A-D][.)]\s*/i, "");
            const isCorrect = correct === letter ||
                              correct === opt.trim().toUpperCase() ||
                              correct.startsWith(letter + ".");
            return `
              <div class="option ${isCorrect ? "correct" : ""}">
                <span class="opt-label">${letter}.</span>
                <span>${escHtml(cleanOpt)}</span>
                ${isCorrect ? '<span class="tick">✔</span>' : ""}
              </div>`;
          }).join("");

          body.innerHTML += `
            <div class="q-block">
              <div class="q-text">Q${i + 1}. ${escHtml(item.question)}</div>
              ${optsHtml}
            </div>`;
        });
      }
    }

    // ── Download PDF ─────────────────────────────────────────
    function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "pt", format: "a4" });

      const margin  = 50;
      const maxW    = doc.internal.pageSize.getWidth() - margin * 2;
      let y         = margin;
      const lineH   = 16;

      function checkPage(needed = lineH) {
        if (y + needed > doc.internal.pageSize.getHeight() - margin) {
          doc.addPage();
          y = margin;
        }
      }

      // Header
      doc.setFont("helvetica", "bold");
      doc.setFontSize(18);
      doc.setTextColor(92, 33, 182);
      doc.text("JVR'S StudyAI", margin, y);
      y += 26;

      const titleEl = document.getElementById("output-title").textContent;
      doc.setFontSize(12);
      doc.setTextColor(80, 80, 80);
      doc.text(titleEl, margin, y);
      y += 24;

      doc.setDrawColor(200, 180, 255);
      doc.line(margin, y, margin + maxW, y);
      y += 18;

      // Content
      const type = document.getElementById("output-type").value;
      const blocks = type === "flashcards"
        ? document.querySelectorAll(".flash-block")
        : document.querySelectorAll(".q-block");

      blocks.forEach((block, i) => {
        checkPage(60);

        if (type === "flashcards") {
          const q = block.querySelector(".flash-q").textContent.trim();
          const a = block.querySelector(".flash-a").textContent.trim();

          doc.setFont("helvetica", "bold");
          doc.setFontSize(10);
          doc.setTextColor(30, 30, 30);
          const qLines = doc.splitTextToSize(q, maxW);
          checkPage(qLines.length * lineH + 30);
          doc.text(qLines, margin, y);
          y += qLines.length * lineH + 6;

          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          doc.setTextColor(4, 120, 87);
          const aLines = doc.splitTextToSize(a, maxW - 14);
          doc.setFillColor(209, 250, 229);
          doc.roundedRect(margin, y - 12, maxW, aLines.length * lineH + 10, 4, 4, "F");
          doc.text(aLines, margin + 8, y);
          y += aLines.length * lineH + 18;

        } else {
          const q = block.querySelector(".q-text").textContent.trim();
          doc.setFont("helvetica", "bold");
          doc.setFontSize(10);
          doc.setTextColor(30, 30, 30);
          const qLines = doc.splitTextToSize(q, maxW);
          checkPage(qLines.length * lineH + 10);
          doc.text(qLines, margin, y);
          y += qLines.length * lineH + 6;

          const opts = block.querySelectorAll(".option");
          opts.forEach(opt => {
            checkPage(lineH + 6);
            const isCorrect = opt.classList.contains("correct");
            const txt = opt.textContent.replace("✔", "").trim();
            doc.setFont("helvetica", isCorrect ? "bold" : "normal");
            doc.setFontSize(10);
            doc.setTextColor(isCorrect ? 4 : 55, isCorrect ? 120 : 65, isCorrect ? 87 : 81);
            if (isCorrect) {
              doc.setFillColor(209, 250, 229);
              doc.roundedRect(margin, y - 11, maxW, lineH + 2, 3, 3, "F");
            }
            const oLines = doc.splitTextToSize((isCorrect ? "✔ " : "   ") + txt, maxW - 10);
            doc.text(oLines, margin + 6, y);
            y += oLines.length * lineH + 4;
          });

          y += 10;
        }
      });

      doc.save("JVR_StudyAI_Output.pdf");
    }

    // ── Helpers ───────────────────────────────────────────────
    function showMsg(el, text, type) {
      el.textContent = text;
      el.className = "msg " + type;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // ── Init ─────────────────────────────────────────────────
    loadTopics();
  </script>
</body>
</html>
