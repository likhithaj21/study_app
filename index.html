<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JVR'S StudyAI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  margin: 0;
}
.container {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}
h1 {
  text-align: center;
  color: #4f46e5;
  margin-bottom: 30px;
}
.card {
  background: white;
  padding: 25px;
  border-radius: 14px;
  margin-bottom: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}
label {
  font-weight: 600;
  margin-top: 10px;
  display: block;
}
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}
button {
  margin-top: 15px;
  padding: 12px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
}
button:hover {
  background: #4338ca;
}
.result {
  background: #f9fafb;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}
.correct {
  color: green;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>🧠 JVR'S StudyAI</h1>

<div class="card">
<h3>Upload Notes</h3>

<input type="text" id="upload-topic" placeholder="Topic">
<input type="file" id="file-input" multiple>

<button onclick="uploadNotes()">Upload Notes</button>
<p id="upload-msg"></p>
</div>

<div class="card">
<h3>Generate</h3>

<select id="gen-topic"></select>

<select id="output-type">
<option value="quiz">Quiz</option>
<option value="flashcards">Flashcards</option>
<option value="question paper">Question Paper</option>
</select>

<button onclick="generate()">Generate</button>
<button onclick="downloadPDF()" id="download-btn" style="display:none;">
📄 Download PDF
</button>

<div id="result" class="result"></div>
</div>

</div>

<script>

// LOAD TOPICS
async function loadTopics() {
  const res = await fetch("/topics");
  const data = await res.json();

  const sel = document.getElementById("gen-topic");
  sel.innerHTML = "";

  data.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    sel.appendChild(opt);
  });
}
window.onload = loadTopics;

// UPLOAD
async function uploadNotes() {
  const topic = document.getElementById("upload-topic").value;
  const files = document.getElementById("file-input").files;

  let fd = new FormData();
  fd.append("topic", topic);

  for (let f of files) {
    fd.append("file", f);
  }

  let res = await fetch("/upload", {method:"POST", body:fd});
  let text = await res.text();

  document.getElementById("upload-msg").textContent = text;
  loadTopics();
}

// GENERATE
async function generate() {
  const topic = document.getElementById("gen-topic").value;
  const type = document.getElementById("output-type").value;

  let res = await fetch("/generate", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      topic: topic,
      output_type: type,
      number_of_questions: 5
    })
  });

  let data = await res.json();

  if(data.error){
    document.getElementById("result").innerHTML = data.error;
    return;
  }

  document.getElementById("download-btn").style.display = "block";

  document.getElementById("result").innerHTML =
    formatOutput(data, type);
}

// 🔥 FORMAT OUTPUT
function formatOutput(data, type){
  let html = "";

  if(type === "quiz" || type === "question paper"){
    data.forEach((q,i)=>{
      html += `<b>Q${i+1}. ${q.question}</b><br>`;
      q.options.forEach((opt,idx)=>{
        let letter = String.fromCharCode(65+idx);
        if(letter === q.answer){
          html += `<div class="correct">✔ ${letter}. ${opt}</div>`;
        } else {
          html += `<div>${letter}. ${opt}</div>`;
        }
      });
      html += `<br>`;
    });
  }

  else if(type === "flashcards"){
    data.forEach((q,i)=>{
      html += `<b>Q${i+1}. ${q.question}</b><br>
      <span class="correct">Answer: ${q.answer}</span><br><br>`;
    });
  }

  return html;
}

// PDF
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const text = document.getElementById("result").innerText;
  const lines = doc.splitTextToSize(text, 180);

  doc.text("JVR'S StudyAI", 10, 10);
  doc.text(lines, 10, 20);

  doc.save("study_material.pdf");
}

</script>

</body>
</html>
