<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JVR'S StudyAI</title>

<!-- ✅ PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  margin: 0;
}
.container {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}
h1 {
  text-align: center;
  color: #4f46e5;
  margin-bottom: 30px;
}
.card {
  background: white;
  padding: 25px;
  border-radius: 14px;
  margin-bottom: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}
label {
  font-weight: 600;
  margin-top: 10px;
  display: block;
}
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}
input[type="file"] {
  border: none;
}
button {
  margin-top: 15px;
  padding: 12px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
  font-size: 15px;
}
button:hover {
  background: #4338ca;
}
.alert {
  margin-top: 10px;
  font-size: 14px;
}
.alert-error {
  color: #dc2626;
}
.alert-success {
  color: #16a34a;
}
.result {
  white-space: pre-wrap;
  background: #f9fafb;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 JVR'S StudyAI</h1>

<!-- UPLOAD -->
<div class="card">
  <h3>Upload Notes</h3>

  <label>Topic</label>
  <input type="text" id="upload-topic" placeholder="e.g Biology, Physics">

  <label>Upload Files (PDF/TXT)</label>
  <input type="file" id="file-input" multiple>

  <button onclick="uploadNotes()">Upload Notes</button>

  <div class="alert alert-success" id="upload-success"></div>
  <div class="alert alert-error" id="upload-error"></div>
</div>

<!-- GENERATE -->
<div class="card">
  <h3>Generate Study Material</h3>

  <label>Select Topic</label>
  <select id="gen-topic"></select>

  <label>Output Type</label>
  <select id="output-type">
    <option value="quiz">Quiz</option>
    <option value="flashcards">Flashcards</option>
    <option value="question paper">Question Paper</option>
  </select>

  <button onclick="generate()">Generate</button>

  <!-- ✅ PDF BUTTON -->
  <button onclick="downloadPDF()" id="download-btn" style="display:none;">
    📄 Download PDF
  </button>

  <div class="alert alert-error" id="gen-error"></div>

  <div id="result" class="result" style="display:none;"></div>
</div>

</div>

<script>

// LOAD TOPICS
async function loadTopics() {
  const res = await fetch("/topics");
  const data = await res.json();

  const sel = document.getElementById("gen-topic");
  sel.innerHTML = "";

  data.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    sel.appendChild(opt);
  });
}

window.onload = loadTopics;

// UPLOAD
async function uploadNotes() {
  const topic = document.getElementById("upload-topic").value;
  const files = document.getElementById("file-input").files;

  hide("upload-error");
  hide("upload-success");

  if (!topic) return show("upload-error","Enter topic");
  if (!files.length) return show("upload-error","Select files");

  const fd = new FormData();
  fd.append("topic", topic);

  for (let f of files) {
    fd.append("file", f);
  }

  try {
    const res = await fetch("/upload", {
      method: "POST",
      body: fd
    });

    const text = await res.text();
    show("upload-success", text);
    loadTopics();

  } catch {
    show("upload-error","Upload failed");
  }
}

// GENERATE
async function generate() {
  const topic = document.getElementById("gen-topic").value;
  const type = document.getElementById("output-type").value;

  hide("gen-error");

  if (!topic) return show("gen-error","Select topic");

  try {
    const res = await fetch("/generate", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        topic: topic,
        output_type: type,
        difficulty: "medium",
        number_of_questions: 5
      })
    });

    const data = await res.json();

    if (data.error) return show("gen-error", data.error);

    document.getElementById("result").style.display="block";
    document.getElementById("result").textContent =
      JSON.stringify(data, null, 2);

    // ✅ SHOW DOWNLOAD BUTTON
    document.getElementById("download-btn").style.display = "block";

  } catch {
    show("gen-error","Generation failed");
  }
}

// ✅ PDF FUNCTION
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const content = document.getElementById("result").textContent;

  const lines = doc.splitTextToSize(content, 180);

  doc.setFontSize(14);
  doc.text("JVR'S StudyAI", 10, 10);

  doc.setFontSize(11);
  doc.text("Generated Study Material", 10, 20);

  doc.text(lines, 10, 30);

  doc.save("study_material.pdf");
}

// HELPERS
function show(id,msg){
  const el = document.getElementById(id);
  el.style.display="block";
  el.textContent=msg;
}
function hide(id){
  document.getElementById(id).style.display="none";
}

</script>

</body>
</html>
