<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StudyAI</title>

<style>
body { font-family: Arial; background:#f5f6fa; padding:20px; }
.card { background:#fff; padding:20px; border-radius:10px; margin-bottom:20px; }
.btn { padding:10px 20px; background:#4f46e5; color:#fff; border:none; cursor:pointer; }
.alert { margin-top:10px; display:none; }
.alert-error { color:red; }
.alert-success { color:green; }
</style>
</head>

<body>

<h2>🧠 StudyAI</h2>

<!-- UPLOAD -->
<div class="card">
  <h3>Upload Notes</h3>

  <input type="text" id="upload-topic" placeholder="Enter topic" /><br><br>

  <!-- MULTIPLE FILE -->
  <input type="file" id="file-input" multiple accept=".pdf,.txt" /><br><br>

  <button class="btn" onclick="uploadNotes()">Upload</button>

  <div class="alert alert-success" id="upload-success"></div>
  <div class="alert alert-error" id="upload-error"></div>
</div>

<!-- GENERATE -->
<div class="card">
  <h3>Generate Questions</h3>

  <select id="gen-topic"></select><br><br>

  <select id="output-type">
    <option value="quiz">Quiz</option>
    <option value="flashcards">Flashcards</option>
    <option value="question_paper">Question Paper</option>
  </select><br><br>

  <button class="btn" onclick="generate()">Generate</button>

  <div class="alert alert-error" id="gen-error"></div>
</div>

<!-- RESULT -->
<div class="card" id="result" style="display:none;">
  <h3>Result</h3>
  <pre id="output"></pre>
</div>

<script>

const BASE = ""; // 🔥 FIXED

// LOAD TOPICS
async function loadTopics() {
  const res = await fetch("/topics");
  const data = await res.json();

  const sel = document.getElementById("gen-topic");
  sel.innerHTML = "";

  data.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t.topic;
    opt.textContent = t.topic;
    sel.appendChild(opt);
  });
}

window.onload = loadTopics;

// UPLOAD
async function uploadNotes() {
  const topic = document.getElementById("upload-topic").value;
  const files = document.getElementById("file-input").files;

  hide("upload-error");
  hide("upload-success");

  if (!topic) return show("upload-error","Enter topic");
  if (!files.length) return show("upload-error","Select files");

  const fd = new FormData();
  fd.append("topic", topic);

  for (let f of files) {
    fd.append("file", f);
  }

  try {
    const res = await fetch("/upload", {
      method: "POST",
      body: fd
    });

    const text = await res.text();

    show("upload-success", text);
    loadTopics();

  } catch {
    show("upload-error","Upload failed");
  }
}

// GENERATE
async function generate() {
  const topic = document.getElementById("gen-topic").value;
  const outputType = document.getElementById("output-type").value;

  hide("gen-error");

  if (!topic) return show("gen-error","Select topic");

  try {
    const res = await fetch("/generate", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        topic: topic,
        output_type: outputType,
        difficulty:"medium",
        number_of_questions:5
      })
    });

    const data = await res.json();

    if (data.error) return show("gen-error", data.error);

    document.getElementById("result").style.display="block";
    document.getElementById("output").textContent =
      JSON.stringify(data.result, null, 2);

  } catch {
    show("gen-error","Generation failed");
  }
}

// HELPERS
function show(id,msg){
  const el = document.getElementById(id);
  el.style.display="block";
  el.textContent=msg;
}
function hide(id){
  document.getElementById(id).style.display="none";
}

</script>

</body>
</html>
